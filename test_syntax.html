<!DOCTYPE html>
<html>
<head>
    <title>Synchronous Syntax Test Runner</title>
    <script>
        window.errorsLog = [];
        window.onerror = function(message, source, lineno, colno, error) {
            var errDiv = document.getElementById('error-log-output');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'error-log-output';
                document.body.appendChild(errDiv);
            }
            var errInfo = {
                message: message,
                source: source,
                lineno: lineno,
                colno: colno
            };
            window.errorsLog.push(errInfo);
            errDiv.innerText = "SYNTAX_ERRORS:" + JSON.stringify(window.errorsLog);
            return false;
        };
    </script>
</head>
<body>
    <h1>Testing JS Files Syntax</h1>
    <!-- Load both scripts. If any syntax error exists, window.onerror will fire immediately during parsing -->
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    
    <div id="test-complete">READY</div>
</body>
</html>
