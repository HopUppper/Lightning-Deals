[build]
  command = "# no build needed"
  publish = "."
  functions = "functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/create-order.php"
  to = "/.netlify/functions/create-order"
  status = 200
  force = true

[[redirects]]
  from = "/api/verify-payment.php"
  to = "/.netlify/functions/verify-payment"
  status = 200
  force = true

[[redirects]]
  from = "/api/razorpay-webhook.php"
  to = "/.netlify/functions/razorpay-webhook"
  status = 200
  force = true

[[redirects]]
  from = "/api/verify-admin.php"
  to = "/.netlify/functions/verify-admin"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth-signup"
  to = "/.netlify/functions/auth-signup"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth-login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth-session"
  to = "/.netlify/functions/auth-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth-reset"
  to = "/.netlify/functions/auth-reset"
  status = 200
  force = true
